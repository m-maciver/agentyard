<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40" fill="none">
  <!-- Icon: hexagon + bolt, scaled to 40px height -->
  <!-- Hex scaled: 40px height → radius ~17.3. viewBox tile: 0 0 40 40 -->
  <!-- Hexagon (flat-top, radius 17, center 20,20) -->
  <!-- Points: (37,20) (28.5,5.25) (11.5,5.25) (3,20) (11.5,34.75) (28.5,34.75) -->
  <polygon
    points="37,20 28.5,5.25 11.5,5.25 3,20 11.5,34.75 28.5,34.75"
    fill="#F7931A"
  />
  <!-- Lightning bolt inside hex (white) -->
  <path
    d="M 23 9 L 13 22 L 20 22 L 16 31 L 26 18 L 19 18 Z"
    fill="#ffffff"
  />

  <!-- Wordmark: "agent" regular + "Yard" bold -->
  <!-- X offset: 48px (after 40px icon + 8px gap) -->
  <text
    x="48"
    y="26"
    font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="400"
    fill="#f0f0f5"
    letter-spacing="-0.3"
  >agent</text>
  <text
    x="112"
    y="26"
    font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="700"
    fill="#f0f0f5"
    letter-spacing="-0.3"
  >Yard</text>
</svg>
